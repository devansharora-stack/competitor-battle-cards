<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techolution — Competitor Battle Cards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Playfair+Display:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-600: #0056B3;
            --blue-500: #3289FF;
            --blue-400: #5CA0FF;
            --blue-300: #8BBDFF;
            --blue-200: #B8D8FF;
            --blue-100: #E8F2FF;
            --blue-50: #F4F8FF;
            --navy: #0A1628;
            --navy-light: #1A2A44;
            --white: #FFFFFF;
            --off-white: #FAFBFD;
            --gray-50: #F6F7F9;
            --gray-100: #ECEEF2;
            --gray-200: #D8DCE4;
            --gray-300: #B4BBC8;
            --gray-400: #8C95A6;
            --gray-500: #636E80;
            --gray-600: #434D5E;
            --gray-700: #2E3746;
            --green: #0B9A5E;
            --green-bg: #ECFAF3;
            --green-border: #B5E8D0;
            --red: #D93B3B;
            --red-bg: #FEF0F0;
            --red-border: #F5C0C0;
            --amber: #C47F17;
            --amber-bg: #FFF8EB;
            --shadow-sm: 0 1px 2px rgba(10,22,40,0.04);
            --shadow-md: 0 4px 16px rgba(10,22,40,0.06);
            --shadow-lg: 0 8px 32px rgba(10,22,40,0.08);
            --shadow-xl: 0 16px 48px rgba(10,22,40,0.10);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--off-white);
            color: var(--navy);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ========= HEADER ========= */
        .header {
            background: var(--white);
            border-bottom: 1px solid var(--gray-100);
            padding: 0 3rem;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--blue-600), var(--blue-500), var(--blue-400));
        }
        .header-inner {
            max-width: 1360px;
            margin: 0 auto;
            padding: 2rem 0 1.75rem;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 2rem;
        }
        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--navy);
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        .header-title span {
            color: var(--blue-600);
        }
        .header-sub {
            color: var(--gray-400);
            font-size: 0.9rem;
            margin-top: 0.3rem;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* ========= EDGE STRIP ========= */
        .edge-strip {
            background: var(--white);
            border-bottom: 1px solid var(--gray-100);
            padding: 0 3rem;
        }
        .edge-strip-inner {
            max-width: 1360px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0;
        }
        .edge-item {
            padding: 1.25rem 1.5rem;
            border-right: 1px solid var(--gray-100);
            animation: fadeUp 0.5s ease-out both;
        }
        .edge-item:last-child { border-right: none; }
        .edge-item:nth-child(1) { animation-delay: 0.05s; }
        .edge-item:nth-child(2) { animation-delay: 0.1s; }
        .edge-item:nth-child(3) { animation-delay: 0.15s; }
        .edge-item:nth-child(4) { animation-delay: 0.2s; }
        .edge-item:nth-child(5) { animation-delay: 0.25s; }
        .edge-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--blue-600);
        }
        .edge-label {
            font-size: 0.7rem;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.15rem;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========= COMPETITOR NAV ========= */
        .competitor-nav {
            background: var(--white);
            border-bottom: 1px solid var(--gray-100);
            padding: 0 3rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }
        .competitor-nav-inner {
            max-width: 1360px;
            margin: 0 auto;
            display: flex;
            gap: 0.25rem;
            padding: 0.75rem 0;
            overflow-x: auto;
        }
        .comp-btn {
            padding: 0.5rem 1.15rem;
            border: 1.5px solid var(--gray-200);
            background: var(--white);
            color: var(--gray-500);
            border-radius: 100px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.25s ease;
            white-space: nowrap;
            letter-spacing: 0.2px;
        }
        .comp-btn:hover {
            border-color: var(--blue-500);
            color: var(--blue-600);
            background: var(--blue-50);
        }
        .comp-btn.active {
            background: var(--blue-600);
            border-color: var(--blue-600);
            color: var(--white);
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(50,137,255,0.25);
        }

        /* ========= MAIN ========= */
        .main {
            max-width: 1360px;
            margin: 0 auto;
            padding: 2rem 3rem 4rem;
        }

        /* ========= BATTLE CARD ========= */
        .battle-card { display: none; }
        .battle-card.active {
            display: block;
            animation: cardIn 0.35s ease-out;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========= KILLER LINE ========= */
        .killer-line {
            background: linear-gradient(135deg, var(--blue-600) 0%, var(--navy-light) 100%);
            border-radius: var(--radius-lg);
            padding: 2.5rem 3rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }
        .killer-line::after {
            content: '';
            position: absolute;
            top: -50%; right: -10%;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(50,137,255,0.2) 0%, transparent 70%);
            border-radius: 50%;
        }
        .killer-line .kl-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--blue-300);
            margin-bottom: 0.75rem;
        }
        .killer-line .kl-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            font-weight: 600;
            color: var(--white);
            line-height: 1.5;
            position: relative;
            z-index: 1;
        }

        /* ========= SECTION TITLES ========= */
        .section-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            margin-top: 0.5rem;
        }
        .section-title h2 {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--blue-600);
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-200);
        }

        /* ========= OVERVIEW GRID ========= */
        .overview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            margin-bottom: 2.5rem;
        }
        .overview-box {
            background: var(--white);
            border: 1px solid var(--gray-100);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s ease;
        }
        .overview-box:hover { box-shadow: var(--shadow-md); }
        .overview-box.is-us {
            border-top: 3px solid var(--blue-500);
        }
        .overview-box.is-them {
            border-top: 3px solid var(--gray-300);
        }
        .ob-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.1rem;
        }
        .ob-header h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--navy);
        }
        .ob-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 0.2rem 0.6rem;
            border-radius: 100px;
            font-weight: 500;
        }
        .ob-tag-us { background: var(--blue-100); color: var(--blue-600); }
        .ob-tag-them { background: var(--gray-50); color: var(--gray-500); }
        .ob-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0.45rem 0;
            border-bottom: 1px solid var(--gray-50);
            font-size: 0.85rem;
        }
        .ob-row:last-child { border-bottom: none; }
        .ob-key { color: var(--gray-400); font-weight: 400; }
        .ob-val { color: var(--navy); font-weight: 500; text-align: right; max-width: 60%; }

        /* ========= COMPARISON TABLE ========= */
        .table-wrap {
            background: var(--white);
            border: 1px solid var(--gray-100);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            margin-bottom: 2.5rem;
        }
        .comp-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }
        .comp-table thead { background: var(--gray-50); }
        .comp-table th {
            text-align: left;
            padding: 0.85rem 1.25rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-400);
            border-bottom: 1px solid var(--gray-100);
        }
        .comp-table td {
            padding: 0.8rem 1.25rem;
            border-bottom: 1px solid var(--gray-50);
            vertical-align: top;
        }
        .comp-table tbody tr {
            transition: background 0.15s ease;
        }
        .comp-table tbody tr:hover { background: var(--blue-50); }
        .comp-table tbody tr:last-child td { border-bottom: none; }
        .col-dim { color: var(--gray-500); font-weight: 600; width: 150px; }
        .col-us { color: var(--blue-600); font-weight: 500; }
        .col-them { color: var(--navy); }
        .col-edge { font-weight: 600; font-size: 0.75rem; }
        .edge-win {
            color: var(--green);
            background: var(--green-bg);
            padding: 0.15rem 0.6rem;
            border-radius: 100px;
            display: inline-block;
        }
        .edge-even {
            color: var(--amber);
            background: var(--amber-bg);
            padding: 0.15rem 0.6rem;
            border-radius: 100px;
            display: inline-block;
        }

        /* ========= WEAKNESS BOX ========= */
        .weakness-box {
            background: var(--red-bg);
            border: 1px solid var(--red-border);
            border-radius: var(--radius);
            padding: 1.5rem 2rem;
            margin-bottom: 2.5rem;
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }
        .weakness-icon {
            width: 36px; height: 36px; min-width: 36px;
            background: var(--red);
            color: var(--white);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            margin-top: 2px;
        }
        .weakness-box h4 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--red);
            margin-bottom: 0.3rem;
            font-weight: 600;
        }
        .weakness-box p {
            font-size: 0.95rem;
            color: var(--gray-700);
            line-height: 1.6;
        }

        /* ========= OBJECTION CARDS ========= */
        .objections-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
        }
        .objection-card {
            background: var(--white);
            border: 1px solid var(--gray-100);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s ease, transform 0.2s ease;
            cursor: default;
        }
        .objection-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }
        .oc-objection {
            font-style: italic;
            color: var(--gray-500);
            font-size: 0.9rem;
            margin-bottom: 0.6rem;
            padding-left: 1rem;
            border-left: 2px solid var(--gray-200);
        }
        .oc-rebuttal {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--blue-600);
            margin-bottom: 0.35rem;
            display: flex;
            gap: 0.5rem;
            align-items: baseline;
        }
        .oc-rebuttal::before {
            content: '';
            width: 6px; height: 6px;
            min-width: 6px;
            background: var(--blue-500);
            border-radius: 50%;
            margin-top: 6px;
        }
        .oc-detail {
            font-size: 0.8rem;
            color: var(--gray-400);
            padding-left: 1rem;
            line-height: 1.5;
        }

        /* ========= TALKING POINTS ========= */
        .tp-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
        }
        .tp-card {
            background: var(--white);
            border: 1px solid var(--gray-100);
            border-radius: var(--radius-sm);
            padding: 1.15rem 1.25rem;
            display: flex;
            gap: 0.85rem;
            align-items: flex-start;
            box-shadow: var(--shadow-sm);
        }
        .tp-num {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--blue-200);
            line-height: 1;
            min-width: 28px;
        }
        .tp-text {
            font-size: 0.85rem;
            color: var(--gray-600);
            line-height: 1.55;
        }
        .tp-text strong {
            color: var(--navy);
            font-weight: 600;
        }

        /* ========= INTEL GRID ========= */
        .intel-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-bottom: 2.5rem;
        }
        .intel-card {
            background: var(--white);
            border: 1px solid var(--gray-100);
            border-radius: var(--radius-sm);
            padding: 1.15rem;
            box-shadow: var(--shadow-sm);
        }
        .intel-card h4 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--blue-500);
            margin-bottom: 0.6rem;
            font-weight: 500;
        }
        .intel-card p {
            font-size: 0.82rem;
            color: var(--gray-500);
            line-height: 1.55;
        }

        /* ========= CHEAT SHEET ========= */
        .cheat-sheet {
            background: var(--white);
            border: 1.5px solid var(--blue-200);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }
        .cheat-sheet::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--blue-50) 0%, transparent 50%);
            pointer-events: none;
        }
        .cs-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--blue-600);
            margin-bottom: 1.25rem;
            position: relative;
        }
        .cs-row {
            display: grid;
            grid-template-columns: 130px 1fr;
            gap: 1rem;
            padding: 0.55rem 0;
            border-bottom: 1px solid var(--gray-50);
            font-size: 0.82rem;
            position: relative;
        }
        .cs-row:last-child { border-bottom: none; }
        .cs-key {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        .cs-val { color: var(--navy); font-weight: 500; }
        .cs-val-accent { color: var(--blue-600); font-weight: 600; }
        .cs-val-red { color: var(--red); font-weight: 500; }
        .cs-val-green { color: var(--green); font-weight: 600; }

        /* ========= RESPONSIVE ========= */
        @media (max-width: 1024px) {
            .intel-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .header, .edge-strip, .competitor-nav, .main { padding-left: 1.25rem; padding-right: 1.25rem; }
            .overview-grid, .tp-grid { grid-template-columns: 1fr; }
            .edge-strip-inner { grid-template-columns: repeat(2, 1fr); }
            .edge-item:nth-child(5) { grid-column: span 2; }
            .intel-grid { grid-template-columns: 1fr; }
            .header-title { font-size: 1.5rem; }
            .killer-line { padding: 1.75rem; }
            .killer-line .kl-text { font-size: 1.1rem; }
        }

        /* ========= PRINT ========= */
        @media print {
            .competitor-nav { position: relative; box-shadow: none; }
            .battle-card { page-break-inside: avoid; }
            .objection-card, .tp-card, .intel-card { box-shadow: none; border: 1px solid #ddd; }
            .killer-line { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-inner">
        <div>
            <div class="header-title"><span>Techolution</span> Battle Cards</div>
            <div class="header-sub">What we do better &mdash; and how to counter every objection</div>
        </div>
    </div>
</div>

<!-- EDGE STRIP -->
<div class="edge-strip">
    <div class="edge-strip-inner">
        <div class="edge-item">

        </div>
        <div class="edge-item">

        <div class="edge-item">

        <div class="edge-item">
            <div class="edge-value">Full Stack</div>

</div>

<!-- COMPETITOR NAV -->
<div class="competitor-nav">
    <div class="competitor-nav-inner" id="compNav"></div>
</div>

<!-- MAIN -->
<div class="main" id="mainContent"></div>
